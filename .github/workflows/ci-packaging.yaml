name: CI Packaging
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            cmd: npm --prefix src/client run package -- --mac --universal
            csc: 'false'
          - os: ubuntu-latest
            cmd: npm --prefix src/client run package -- --linux --x64
            csc: ''
          - os: windows-latest
            cmd: npm --prefix src/client run package -- --win --x64
            csc: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install client deps
        run: npm ci
        working-directory: src/client

      - name: Build client
        run: npm run build
        working-directory: src/client

      - name: Package
        run: ${{ matrix.cmd }}
        working-directory: src/client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.csc }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiama-${{ matrix.os }}
          path: dist/binaries
